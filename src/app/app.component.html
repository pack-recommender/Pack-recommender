<div class="language-dropdown">
  <button class="dropdown-toggle" (click)="toggleDropdown()" [disabled]="!canChangeLang">
    🌐 {{ currentLang.toUpperCase() }}
  </button>
  <ul *ngIf="dropdownOpen && canChangeLang" class="dropdown-menu">
    <li (click)="changeLang('en')">English</li>
    <li (click)="changeLang('he')">עברית</li>
  </ul>
</div>

<router-outlet></router-outlet>
