# Cloudflare Workers static site + API routes
# https://developers.cloudflare.com/workers/framework-guides/web-apps/astro/

name = "pack-recommender"
main = "worker/index.ts"
compatibility_date = "2026-06-30"

[vars]
CONTACT_TO_EMAIL = "michael@packrecommender.com"
CONTACT_FROM_EMAIL = "PackRecommender <info@packrecommender.com>"
MAINTENANCE_MODE = "false"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
